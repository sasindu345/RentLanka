name: Deploy to Azure

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-and-deploy-api:
    name: Build & Deploy Backend API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true

      - name: Restore dependencies
        run: dotnet restore api/RentLanka.Api.csproj

      - name: Publish API
        run: dotnet publish api/RentLanka.Api.csproj -c Release -o ./publish-api --no-restore

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: rentlanka-api
          package: ./publish-api

      - name: Run Deployment Smoke Test
        run: |
          echo "Running Smoke Test against production API health endpoint..."
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://rentlanka-api.azurewebsites.net/health)
          if [ "$STATUS_CODE" -ne 200 ]; then
            echo "Smoke test failed! Production health check returned HTTP status $STATUS_CODE"
            exit 1
          fi
          echo "Smoke test passed! Production API is healthy."

  build-android-apk:
    name: Build Flutter Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
          cache-key: "flutter-:os:-:channel:-:version:-:arch:-:hash:"

      - name: Get packages
        run: flutter pub get
        working-directory: mobile

      - name: Build Release APK
        run: flutter build apk --release --dart-define=API_BASE_URL=https://rentlanka-api.azurewebsites.net --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}
        working-directory: mobile

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rentlanka-android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

