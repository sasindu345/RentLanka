name: mobile
description: RentLanka mobile app — peer-to-peer equipment rental in Sri Lanka.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  lucide_icons_flutter: ^3.0.0
  shimmer: ^3.0.0
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  sentry_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
