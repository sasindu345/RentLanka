name: mobile
description: RentLanka mobile app — peer-to-peer equipment rental in Sri Lanka.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.8.0+1
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  camera: ^0.11.1
  lucide_icons_flutter: ^3.0.0
  shimmer: ^3.0.0
  firebase_core: ^3.1.1
  firebase_messaging: ^15.0.1
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  sentry_flutter: ^8.0.0
  google_sign_in: ^6.2.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  url_launcher: ^6.2.5
  pdf: ^3.10.8
  share_plus: ^7.2.1
  signalr_netcore: ^1.4.3
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/image-logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
